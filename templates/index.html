<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawl Me Maybe 📞 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for results */
        .results-scroll::-webkit-scrollbar { width: 6px; }
        .results-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .results-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-10">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">📞</span>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Crawl Me <span class="text-indigo-600">Maybe</span></h1>
        </div>
        
        <div class="flex space-x-6 text-sm font-medium">
            <div class="bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100 flex items-center space-x-2">
                <span class="text-indigo-600">Indexed Pages:</span>
                <span id="navIndexed" class="text-indigo-900 font-bold">0</span>
            </div>
            <div class="bg-emerald-50 px-4 py-1.5 rounded-full border border-emerald-100 flex items-center space-x-2">
                <span class="text-emerald-600">Active Workers:</span>
                <span id="navWorkers" class="text-emerald-900 font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <div class="flex items-center space-x-2 mb-6">
                    <span class="text-xl">🚀</span>
                    <h2 class="text-lg font-bold text-slate-800">Create Crawler Job</h2>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Origin URL <span class="text-red-500">*</span></label>
                        <input type="text" id="originUrl" placeholder="https://quotes.toscrape.com/" 
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Max Depth (k)</label>
                            <input type="number" id="depthK" value="2" min="1" 
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
    <label class="block text-sm font-medium text-slate-600 mb-1">Queue Capacity</label>
    <input type="number" id="queueCap" value="1000" min="10" 
        class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
</div>
                    </div>
                    
                    <button onclick="startIndex()" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors flex justify-center items-center space-x-2">
                        <span>Start Engine</span>
                    </button>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 p-6 text-white">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Live System Metrics</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-700/50 p-4 rounded-lg">
                        <div class="text-xs text-slate-400 mb-1">State</div>
                        <div id="statusState" class="font-medium text-slate-300">Idle</div>
                    </div>
                    <div class="bg-slate-700/50 p-4 rounded-lg">
                        <div class="text-xs text-slate-400 mb-1">Queue Depth</div>
                        <div id="statusQueue" class="font-medium text-amber-400 text-xl">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-full flex flex-col">
                <div class="flex items-center space-x-2 mb-6">
                    <span class="text-xl">🔍</span>
                    <h2 class="text-lg font-bold text-slate-800">Search Engine</h2>
                </div>

                <div class="flex space-x-3 mb-6">
                    <input type="text" id="searchQuery" placeholder="Enter keyword to search in indexed pages..." 
                        class="flex-grow px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                        onkeypress="if(event.key === 'Enter') performSearch()">
                    <button onclick="performSearch()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2.5 rounded-lg font-medium transition-colors">
                        Search
                    </button>
                </div>

                <div class="flex-grow border border-slate-100 bg-slate-50 rounded-lg p-4 overflow-y-auto results-scroll" style="max-height: 500px;">
                    <ul id="resultsList" class="space-y-3">
                        <li class="text-slate-400 text-center py-8 text-sm">No queries executed yet. Start searching!</li>
                    </ul>
                </div>
            </div>
        </div>
        
    </main>

    <script>
       async function startIndex() {
            const origin = document.getElementById('originUrl').value;
            const k = document.getElementById('depthK').value;
            const qCap = document.getElementById('queueCap').value; // Yeni eklenen satir
            if(!origin) return alert("Please enter a valid URL!");

            try {
                // URL'in sonuna queue_capacity eklendi
                const res = await fetch(`/index?origin=${encodeURIComponent(origin)}&k=${k}&queue_capacity=${qCap}`, { method: 'POST' });
                const data = await res.json();
                
                // Show a brief notification instead of alert for better UX
                const btn = document.querySelector('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<span>Started!</span>`;
                btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-emerald-500', 'bg-indigo-600');
                }, 2000);
            } catch(e) {
                console.error(e);
            }
        }

        async function performSearch() {
            const query = document.getElementById('searchQuery').value;
            const list = document.getElementById('resultsList');
            
            if(!query) {
                list.innerHTML = `<li class="text-slate-400 text-center py-8 text-sm">Please enter a keyword.</li>`;
                return;
            }

            list.innerHTML = `<li class="text-indigo-500 text-center py-8 text-sm flex justify-center items-center space-x-2">
                                <svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                Searching...
                              </li>`;

            const res = await fetch(`/search?query=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            list.innerHTML = "";
            
            if(data.results.length === 0) {
                list.innerHTML = `<li class="text-slate-500 text-center py-8 bg-white border border-slate-200 rounded-lg shadow-sm">No relevant URLs found for "<b>${query}</b>".</li>`;
                return;
            }

            data.results.forEach(item => {
                const li = document.createElement('li');
                li.className = "bg-white p-4 rounded-lg border border-slate-200 shadow-sm hover:shadow-md transition-shadow";
                li.innerHTML = `
                    <div class="flex justify-between items-start">
                        <a href="${item.relevant_url}" target="_blank" class="text-indigo-600 hover:text-indigo-800 font-medium truncate pr-4 block">
                            ${item.relevant_url}
                        </a>
                        <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-md border border-slate-200 shrink-0">
                            Depth: ${item.depth}
                        </span>
                    </div>
                    <div class="mt-2 text-xs text-slate-400 flex items-center">
                        <span class="mr-1">🔗 Discovered from:</span> 
                        <span class="truncate">${item.origin_url}</span>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // Live polling
        setInterval(async () => {
            try {
                const res = await fetch('/status');
                const status = await res.json();
                
                // Update Top Nav Stats
                document.getElementById('navIndexed').innerText = status.indexed_pages;
                document.getElementById('navWorkers').innerText = status.active_workers;
                
                // Update Status Card
                const stateEl = document.getElementById('statusState');
                if(status.is_running) {
                    stateEl.innerHTML = '<span class="text-emerald-400 flex items-center"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse mr-2"></span> Running</span>';
                } else {
                    stateEl.innerHTML = '<span class="text-slate-400 flex items-center"><span class="w-2 h-2 bg-slate-400 rounded-full mr-2"></span> Idle</span>';
                }
                
                document.getElementById('statusQueue').innerText = status.queue_size;
            } catch (e) {
                console.error("Status fetch failed");
            }
        }, 1000); // Polling every 1 second for smoother UI updates
    </script>
</body>
</html>
